specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Unit
providerId: unit
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- FinTech
- BaaS
- Banking
- Payments
- Card Issuing
- ACH
- Rate Limiting
description: Unit enforces per-IP rate limits in addition to per-token throttling.
notes: Sandbox and production limits differ.
sources:
- https://www.unit.co/docs/api/rate-limit
responseCodes:
  throttled: 429
limits:
- name: Per-IP RPS
  scope: ip
  metric: requests_per_minute
  limit: 1000
  notes: 1000 requests per minute per IP, separate limits in sandbox vs production.
policies:
- name: Backoff Strategy
  description: Exponential backoff on 429.
- name: Idempotency
  description: Use idempotency-key headers on POST endpoints.
- name: Customer Tokens
  description: Use customer-scoped tokens for end-user actions per Unit security guidance.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
