name: Unit
x-type: company
description: Unit is a Banking-as-a-Service platform offering REST APIs for customers
  and applications, deposit/credit/wallet accounts, cards (issuance, authorizations,
  disputes), payments (ACH, wire, book, batch), transactions, statements, and webhooks.
  OAuth 2.0 with org-level and customer tokens; idempotency and tagging built in.
