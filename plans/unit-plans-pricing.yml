specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Unit
providerId: unit
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- FinTech
- BaaS
- Banking
- Payments
- Card Issuing
- ACH
- Plans
description: Unit is sold under custom contracts. Sandbox is free; production requires
  a signed BaaS agreement with Unit and the partner bank. Fees include monthly platform,
  per-transaction, per-card, ACH/wire, and interest sharing.
notes: Pricing is not publicly listed.
sources:
- https://www.unit.co/
- https://www.unit.co/docs/api
plans:
- id: unit-sandbox
  name: Sandbox
  type: free
  description: Free sandbox at https://api.s.unit.sh.
  entries:
  - label: Sandbox Access
    name: sandbox
    type: included
    metric: api_calls
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: All APIs
  - name: Test Data
- id: unit-production
  name: Production (Custom)
  type: enterprise
  description: Custom production contract.
  entries:
  - label: Platform Fee
    name: platform_fee
    type: flat
    metric: subscription
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: negotiated
    userMultiplied: false
  - label: Per Transaction
    name: txn_fee
    type: metered
    metric: transaction
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: negotiated
    userMultiplied: false
  elements:
  - name: Partner Banks
  - name: Production APIs
  - name: PCI
